services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5000
    tmpfs:
      - /app/backend/temp:size=64m,uid=1000,gid=1000,mode=1777,exec
    restart: unless-stopped
